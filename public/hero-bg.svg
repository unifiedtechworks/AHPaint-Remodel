    <path d="M22 62 L100 5 L178 62" stroke-width="8" />
    <path d="M186 34 L138 82" stroke-width="7" />
    <path d="M151 47 L173 69" stroke-width="7" />
    <path d="M26 154 L86 94" stroke-width="8" />
    <path d="M18 146 L34 162" stroke-width="8" />
