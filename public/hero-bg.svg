  <ellipse cx="1370" cy="315" rx="560" ry="260" fill="#dfe3e6" opacity="0.1" filter="url(#softBlur)" />
  <ellipse cx="1270" cy="780" rx="620" ry="230" fill="#aeb4ba" opacity="0.045" filter="url(#softBlur)" />

