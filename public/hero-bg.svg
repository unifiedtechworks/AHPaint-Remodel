<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1000" role="img" aria-label="Abstract black and silver remodeling background">
  <defs>
    <linearGradient id="matte" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030304" />
      <stop offset="0.55" stop-color="#101114" />
      <stop offset="1" stop-color="#23262a" />
    </linearGradient>
    <linearGradient id="silverSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="0.52" stop-color="#dce0e3" stop-opacity="0.17" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <pattern id="brushed" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)">
      <path d="M0 6 H22 M0 15 H22" stroke="#f2f4f5" stroke-opacity="0.028" stroke-width="1" />
    </pattern>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <rect width="1800" height="1000" fill="url(#matte)" />
