<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>Page Not Found | Aaron Hansen Paint & Remodel</title>
    <style>
      :root {
        color: #f4f4f2;
        background: #0b0b0c;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 320px;
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: clamp(1.25rem, 5vw, 3rem);
        background:
          radial-gradient(circle at top left, rgba(210, 215, 219, 0.16), transparent 28rem),
          radial-gradient(circle at bottom right, rgba(210, 215, 219, 0.08), transparent 22rem),
          linear-gradient(135deg, #0b0b0c 0%, #161719 48%, #24272a 100%);
      }

      main {
        width: min(100%, 780px);
      }

      .not-found-card {
        border: 1px solid rgba(210, 215, 219, 0.2);
        border-radius: 1.35rem;
        padding: clamp(1.5rem, 6vw, 3rem);
        background:
          linear-gradient(135deg, rgba(31, 33, 36, 0.95), rgba(10, 11, 12, 0.94)),
          radial-gradient(circle at top right, rgba(225, 228, 231, 0.12), transparent 18rem);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      .eyebrow {
        margin: 0 0 0.85rem;
        color: #e1e4e7;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 1rem;
        color: #ffffff;
        font-size: clamp(2.4rem, 12vw, 5rem);
        line-height: 0.96;
        letter-spacing: -0.06em;
      }

      p {
        max-width: 62ch;
        margin: 0;
        color: #b9bdc1;
        font-size: clamp(1rem, 3vw, 1.12rem);
        line-height: 1.72;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-top: 2rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3.2rem;
        border: 2px solid transparent;
        border-radius: 999px;
        padding: 0.9rem 1.25rem;
        font-weight: 900;
        text-decoration: none;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease,
          box-shadow 180ms ease;
      }

      a:focus-visible {
        outline: 3px solid rgba(225, 228, 231, 0.78);
        outline-offset: 3px;
      }

      a:hover,
      a:focus-visible {
        transform: translateY(-2px);
      }

      .button-primary {
        color: #070708;
        background: linear-gradient(135deg, #f2f4f5, #aeb4ba);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      }

      .button-primary:hover,
      .button-primary:focus-visible {
        background: linear-gradient(135deg, #ffffff, #cbd0d4);
      }

      .button-secondary {
        border-color: rgba(225, 228, 231, 0.42);
        color: #ffffff;
        background: rgba(255, 255, 255, 0.08);
      }

      .button-secondary:hover,
      .button-secondary:focus-visible {
        border-color: rgba(245, 247, 248, 0.78);
        background: rgba(255, 255, 255, 0.14);
      }

      @media (max-width: 460px) {
        .actions {
          display: grid;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="not-found-card" aria-labelledby="page-title">
        <p class="eyebrow">Aaron Hansen Paint &amp; Remodel LLC</p>
        <h1 id="page-title">Page not found</h1>
        <p>
          The page you requested could not be found. Return to the homepage to view painting, remodeling, and project information for Aaron Hansen Paint &amp; Remodel LLC.
        </p>
        <div class="actions" aria-label="Page not found actions">
          <a class="button-primary" href="https://ahpaintremodel.com/">Return to Homepage</a>
          <a class="button-secondary" href="tel:5415713188">Call Aaron</a>
        </div>
      </section>
    </main>
  </body>
</html>
